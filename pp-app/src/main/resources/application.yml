server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: proactive-people-agent
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

pp:
  llm:
    enabled: ${PP_LLM_ENABLED:false}
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model-name: ${OPENAI_MODEL:gpt-4o-mini}
    temperature: ${OPENAI_TEMPERATURE:0.7}
    timeout-seconds: 60
    chat-memory-max-messages: 20
  memory:
    provider: stub
    mem0:
      mode: oss
      base-url: ${MEM0_BASE_URL:http://localhost:8000}
      api-key: ${MEM0_API_KEY:}
      timeout-seconds: 10
      infer-on-add: false
  wechat:
    provider: stub
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    token: ${WECHAT_TOKEN:}
    api-base-url: ${WECHAT_API_BASE_URL:https://api.weixin.qq.com}
    timeout-seconds: 10
    customer-service-window-hours: 48
    template-id: ${WECHAT_TEMPLATE_ID:}
    template-content-key: thing1
  mcp:
    provider: stub
  monitor:
    provider: stub
  proactive:
    morning-push-enabled: false
    daily-push-limit: 2
    default-timezone: Asia/Shanghai
    morning-window-start-hour: 8
    morning-window-end-hour: 10
    # 宽扫描：每位用户是否推送由本地时区 8-10 窗口决定
    morning-scan-cron: "0 */1 * * * *"
    users: []
    # 示例（启用 morning-push 时取消注释或在 local profile 配置）:
    # users:
    #   - user-id: demo-user
    #     open-id: demo-openid
    #     timezone: Asia/Shanghai
    #     location-authorized: true
    #     city: 上海
    #     do-not-disturb: false
  infra:
    postgres:
      enabled: false
      url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/pp_agent}
    redis:
      enabled: false
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
    mem0:
      enabled: false
      base-url: ${MEM0_BASE_URL:http://localhost:8000}

logging:
  level:
    com.proactiveperson: INFO
